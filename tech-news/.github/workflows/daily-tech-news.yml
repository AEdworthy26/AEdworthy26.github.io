name: Daily Tech News Update

on:
  schedule:
    # 07:30 UTC daily (offset from world-news to avoid overlapping runs)
    - cron: '30 7 * * *'

  # Manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-tech-news:
    name: Fetch & rebuild tech news
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Dependencies ───────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Generate ───────────────────────────────────────────────────────
      - name: Generate tech-news.json
        run: node scripts/generate-news.js

      # ── 5. Commit ─────────────────────────────────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tech-news.json
          git diff --staged --quiet || git commit -m "chore: daily tech news update $(date -u +%Y-%m-%d)"

      # ── 6. Push ───────────────────────────────────────────────────────────
      - name: Push changes
        run: git push

      # ── 7. Redeploy ───────────────────────────────────────────────────────
      #    Add VERCEL_DEPLOY_HOOK as a repository secret in Settings → Secrets → Actions
      - name: Trigger Vercel deploy
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
