name: Daily Curiosity Corner

on:
  schedule:
    # 06:00 UTC daily
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate:
    name: Generate & deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate curiosity.json
        run: node scripts/generate-curiosity.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/curiosity.json
          git diff --staged --quiet || git commit -m "chore: curiosity corner update $(date -u +%Y-%m-%d)"

      - name: Push
        run: git push

      - name: Trigger Vercel deploy
        if: ${{ secrets.VERCEL_DEPLOY_HOOK != '' }}
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
